<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แชร์โปรโมชั่นพิเศษ</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Prompt', sans-serif;
    background:#0f172a;
    color:#fff;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

img{
    width:100%;
    border-radius:16px;
    box-shadow:0 0 20px rgba(0,255,200,0.4);
}

.caption{
    margin-top:12px;
    font-size:16px;
    color:#cbd5e1;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00f5a0,#00d9f5);
    color:#000;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

#success{
    margin-top:15px;
    display:none;
    color:#00f5a0;
}
</style>
</head>

<body>

<div class="container">

    <img src="https://img2.pic.in.th/1c84ccf9-f728-43fd-ae2f-d3ef22577062.jpg">

    <div class="caption">
        แชร์ให้เพื่อนหรือกลุ่ม เพื่อรับสิทธิ์พิเศษทันที 🎁
    </div>

    <button onclick="shareFlex()">📤 กดแชร์เลย</button>

    <div id="success">แชร์สำเร็จแล้ว 🎉</div>

</div>

<script>

async function initLIFF(){
    await liff.init({ liffId: "2009033240-Q45swj3M" });
}
initLIFF();

async function shareFlex(){

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const flexMessage = {
        type: "flex",
        altText: "โปรโมชั่นพิเศษ 24 ชั่วโมง",
        contents: {
            type: "bubble",
            size: "mega",

            hero: {
                type: "image",
                url: "https://img2.pic.in.th/1c84ccf9-f728-43fd-ae2f-d3ef22577062.jpg",
                size: "full",
                aspectMode: "cover",
                aspectRatio: "1:1"
            },

            body: {
                type: "box",
                layout: "vertical",
                spacing: "md",
                backgroundColor: "#0f172a",
                paddingAll: "16px",
                contents: [
                    {
                        type: "text",
                        text: "โปรโมชั่นพิเศษ 24 ชั่วโมง",
                        weight: "bold",
                        size: "xl",
                        align: "center",
                        color: "#00f5a0"
                    },
                    {
                        type: "text",
                        text: "สิทธิ์พิเศษสำหรับสมาชิกวันนี้เท่านั้น รีบกดรับก่อนหมดเวลา",
                        size: "sm",
                        wrap: true,
                        align: "center",
                        color: "#e2e8f0"
                    }
                ]
            },

            footer: {
                type: "box",
                layout: "vertical",
                backgroundColor: "#020617",
                paddingAll: "14px",
                contents: [
                    {
                        type: "button",
                        style: "primary",
                        height: "sm",
                        color: "#00d9f5",
                        action: {
                            type: "uri",
                            label: "กดรับสิทธิ์ทันที",
                                uri: "https://lin.ee/Blc5G9B"                        }
                    }
                ]
            }
        }
    };

    try{
        await liff.shareTargetPicker([flexMessage]);
        document.getElementById("success").style.display = "block";
    }catch(err){
        console.error(err);
    }
}

</script>

</body>
</html>
