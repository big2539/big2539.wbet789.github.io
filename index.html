<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร่วมกิจกรรมพิเศษ</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    margin:0;
    padding:0;
    background:#000;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    color:#fff;
}

.container{
    padding:20px;
}

img{
    width:100%;
    max-width:500px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,215,0,0.6);
}

.caption{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#FFD700;
}

button{
    margin-top:25px;
    padding:15px 30px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff0000,#ffcc00);
    color:#000;
    cursor:pointer;
    box-shadow:0 0 15px #ffcc00;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="container">
    <img src="https://img2.pic.in.th/1c84ccf9-f728-43fd-ae2f-d3ef22577062.jpg">
    
    <div class="caption">
        🔥 กิจกรรมพิเศษ เพียงกดแชร์ ลุ้นรับสิทธิพิเศษทันที!
    </div>

    <button onclick="shareFlex()">
        🚀 กดแชร์ให้เพื่อน/กลุ่ม
    </button>
</div>

<script>
const LIFF_ID = "2009033240-Q45swj3M";

async function main() {
    await liff.init({ liffId: LIFF_ID });
}

main();

async function shareFlex() {

    const flexMessage = {
        type: "flex",
        altText: "กิจกรรมพิเศษ! กดเข้าร่วมเลย",
        contents: {
            type: "bubble",
            hero: {
                type: "image",
                url: "https://img2.pic.in.th/1c84ccf9-f728-43fd-ae2f-d3ef22577062.jpg",
                size: "full",
                aspectRatio: "1:1",
                aspectMode: "cover"
            },
            body: {
                type: "box",
                layout: "vertical",
                contents: [
                    {
                        type: "text",
                        text: "🎉 ร่วมกิจกรรมพิเศษ",
                        weight: "bold",
                        size: "xl",
                        color: "#ffcc00"
                    },
                    {
                        type: "text",
                        text: "เพียงกดปุ่มด้านล่าง เข้าร่วมกิจกรรมวันนี้ พร้อมรับสิทธิพิเศษทันที!",
                        wrap: true,
                        margin: "md",
                        size: "sm"
                    }
                ]
            },
            footer: {
                type: "box",
                layout: "vertical",
                spacing: "sm",
                contents: [
                    {
                        type: "button",
                        style: "primary",
                        color: "#ff0000",
                        action: {
                            type: "uri",
                            label: "🎯 เข้าร่วมกิจกรรม",
                            uri: "https://lin.ee/Blc5G9B"
                        }
                    }
                ]
            }
        }
    };

    try {
        await liff.shareTargetPicker([flexMessage]);

        alert("ขอขอบคุณที่ร่วมกิจกรรม");
        window.location.href = "https://lin.ee/Blc5G9B";

    } catch (err) {
        alert("เกิดข้อผิดพลาดในการแชร์");
        console.log(err);
    }
}
</script>

</body>
</html>
